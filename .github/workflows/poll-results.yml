name: Poll match results

# Polls football-data.org and commits results.json when a result changes.
# Pages (deploy-from-branch) redeploys automatically on the push, so visitors
# always get fresh results. The app fetches results.json with a cache-bust, so
# the new data shows up immediately on next load.

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 min (GitHub may delay under load)
  workflow_dispatch:          # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: poll-results
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Poll football-data.org
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          COMPETITION: WC
        run: node scripts/poll-results.mjs

      - name: Commit results.json if it changed
        run: |
          if git diff --quiet -- results.json; then
            echo "No result changes."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add results.json
            git commit -m "chore: update results.json"
            git push
          fi
